<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NROS-P — Pediatric Neuro Outcome Scale | Beacon Clinical Research</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0A0E1D;--bg2:#0F1729;--bg3:#141E35;
  --text:#F0F4FF;--text-muted:#94A3B8;--text-dim:#64748B;
  --accent:#00D4D4;--accent-hover:#00AEAE;--accent-dim:rgba(0,212,212,0.12);
  --border:#1A2744;--border-bright:#253660;
  --card:#111B30;--card2:#162035;
  --warn-bg:rgba(124,58,237,0.12);--warn-border:#7C3AED;
  --crisis-bg:rgba(220,38,38,0.12);--crisis-border:#DC2626;
  --dev-bg:rgba(14,165,233,0.10);--dev-border:#0EA5E9;--dev-text:#BAE6FD;
  --success:#22C55E;--amber:#F59E0B;
}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
#app{min-height:100vh;display:flex;flex-direction:column;}
.sticky-header{position:sticky;top:0;z-index:100;background:rgba(8,12,26,0.98);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,212,212,0.12);padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:16px;height:60px;}
.header-left{display:flex;align-items:center;gap:12px;text-decoration:none;}
.beacon-logo-img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(0,212,212,0.5);flex-shrink:0;box-shadow:0 0 12px rgba(0,212,212,0.2);}
.brand-wordmark{display:flex;flex-direction:column;line-height:1;gap:1px;}
.brand-name{font-size:14px;font-weight:800;color:#F0F4FF;letter-spacing:0.08em;text-transform:uppercase;}
.brand-sub{font-size:9px;font-weight:700;color:var(--accent);letter-spacing:0.18em;text-transform:uppercase;}
.header-divider{width:1px;height:28px;background:rgba(255,255,255,0.12);flex-shrink:0;}
.nros-symbol{font-size:18px;font-weight:900;letter-spacing:2px;}
.sN{color:#DC2626;text-shadow:0 0 8px rgba(220,38,38,0.5);}
.sR{color:#F0F4FF;}
.sO{color:#3C3B6E;text-shadow:0 0 8px rgba(60,59,110,0.8);}
.sS{color:#DC2626;text-shadow:0 0 8px rgba(220,38,38,0.5);}
.sDash{color:#475569;}
.sP{color:#00D4D4;text-shadow:0 0 8px rgba(0,212,212,0.5);}
.stars-row{font-size:7px;letter-spacing:2px;color:rgba(240,244,255,0.45);margin-top:1px;}
.ver-chip{font-size:10px;font-weight:700;background:var(--dev-bg);border:1px solid var(--dev-border);color:var(--dev-text);border-radius:20px;padding:3px 9px;white-space:nowrap;}
.progress-wrap{flex:1;max-width:240px;}
.progress-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#B22234,#00D4D4);border-radius:2px;transition:width 0.4s ease;}
.progress-lbl{font-size:10px;color:var(--text-dim);text-align:right;margin-top:3px;}
.screen{flex:1;padding:20px 16px 100px;max-width:700px;width:100%;margin:0 auto;}
.landing-hero{text-align:center;padding:28px 0 20px;}
.beacon-logo-large{width:120px;height:120px;border-radius:50%;object-fit:cover;border:2.5px solid var(--accent);margin:0 auto 18px;display:block;box-shadow:0 0 32px rgba(0,212,212,0.4);}
.nros-hero{font-size:52px;font-weight:900;letter-spacing:3px;line-height:1;margin-bottom:4px;}
.nros-hero .hN{color:#DC2626;text-shadow:0 2px 12px rgba(220,38,38,0.6);}
.nros-hero .hR{color:#FFF;}
.nros-hero .hO{color:#3C3B6E;text-shadow:0 2px 12px rgba(60,59,110,0.9);}
.nros-hero .hS{color:#DC2626;text-shadow:0 2px 12px rgba(220,38,38,0.6);}
.nros-hero .hDash{color:#475569;}
.nros-hero .hP{color:#00D4D4;text-shadow:0 2px 12px rgba(0,212,212,0.6);}
.hero-stars{font-size:11px;letter-spacing:3px;color:rgba(240,244,255,0.4);margin:4px 0 8px;}
.nros-sub{font-size:13px;color:var(--text-muted);letter-spacing:0.08em;font-weight:600;text-transform:uppercase;margin-bottom:22px;}
.dev-notice{background:var(--dev-bg);border:1px solid var(--dev-border);border-radius:12px;padding:12px 16px;margin-bottom:22px;font-size:13px;color:var(--dev-text);line-height:1.6;}
.landing-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:18px;text-align:left;}
.landing-card h3{font-size:15px;font-weight:700;margin-bottom:10px;}
.landing-card p{font-size:14px;color:var(--text-muted);line-height:1.7;}
.subscale-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:14px;}
.subscale-chip{background:var(--accent-dim);border:1px solid rgba(0,212,212,0.2);border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;color:var(--accent);}
.attribution{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:10px;padding:12px 15px;margin-bottom:18px;font-size:12px;color:var(--text-dim);line-height:1.7;}
.attribution a{color:var(--accent);text-decoration:none;}
.usa-footer{text-align:center;padding:18px 0 6px;font-size:12px;color:var(--text-dim);}
.btn-primary{width:100%;padding:16px;background:var(--accent);color:#0A0E1D;border:none;border-radius:12px;font-size:16px;font-weight:800;cursor:pointer;transition:background 0.2s;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-secondary{width:100%;padding:13px;background:transparent;color:var(--text-muted);border:1px solid var(--border);border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;transition:all 0.2s;}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.page-title{font-size:24px;font-weight:800;margin-bottom:6px;}
.page-sub{font-size:14px;color:var(--text-muted);margin-bottom:22px;line-height:1.6;}
.form-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.form-section-title{font-size:12px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px;}
.form-row{margin-bottom:14px;}
.form-row:last-child{margin-bottom:0;}
.form-label{font-size:13px;font-weight:600;color:var(--text-muted);margin-bottom:7px;display:block;}
.form-input,.form-select{width:100%;background:var(--bg3);border:1px solid var(--border-bright);border-radius:10px;padding:13px 15px;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;transition:border-color 0.2s;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--accent);}
.form-select option{background:var(--bg2);}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.consent-row{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--bg3);border:1px solid var(--border-bright);border-radius:10px;cursor:pointer;}
.consent-check{width:22px;height:22px;min-width:22px;border:2px solid var(--border-bright);border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;margin-top:1px;}
.consent-check.checked{background:var(--accent);border-color:var(--accent);}
.consent-check.checked::after{content:'\2713';color:#0A0E1D;font-size:14px;font-weight:900;}
.consent-text{font-size:13px;color:var(--text-muted);line-height:1.7;}
.reg-error{color:#F87171;font-size:13px;margin-top:10px;padding:9px 13px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:8px;display:none;}
.flare-options{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
.flare-option{background:var(--card);border:2px solid var(--border);border-radius:13px;padding:16px 18px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:14px;}
.flare-option:hover,.flare-option.selected{border-color:var(--accent);background:var(--accent-dim);}
.flare-label{font-size:15px;font-weight:700;}
.flare-desc{font-size:12px;color:var(--text-muted);margin-top:2px;}
.domain-header{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border-bright);border-radius:14px;padding:18px;margin-bottom:18px;}
.domain-sec-badge{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;border-radius:20px;padding:4px 12px;margin-bottom:8px;background:var(--accent-dim);color:var(--accent);border:1px solid rgba(0,212,212,0.25);}
.domain-title{font-size:22px;font-weight:900;margin-bottom:5px;}
.domain-meta{font-size:13px;color:var(--text-muted);}
.framing-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:16px;font-size:14px;color:var(--text-muted);line-height:1.7;}
.sensitive-box{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:12px;padding:14px 16px;font-size:13px;color:#C4B5FD;line-height:1.7;margin-bottom:16px;}
.crisis-box{background:var(--crisis-bg);border:2px solid var(--crisis-border);border-radius:12px;padding:16px 18px;font-size:14px;color:#FCA5A5;line-height:1.7;margin-bottom:16px;font-weight:600;}
.crisis-num{font-size:20px;font-weight:900;color:#F87171;display:block;margin-bottom:3px;}
.q-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;}
.q-row-num{font-size:11px;color:var(--text-dim);font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.q-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;}
.q-row-text{font-size:16px;font-weight:600;margin-bottom:12px;line-height:1.5;}
.ans-pills{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.ans-pill{border-radius:10px;padding:11px 6px;cursor:pointer;text-align:center;border:2px solid transparent;font-size:12px;font-weight:700;line-height:1.3;transition:all 0.15s;-webkit-appearance:none;}
.ans-pill-val{font-size:17px;font-weight:900;display:block;margin-bottom:1px;}
.ans-pill-0{background:#052E16;border-color:#166534;color:#86EFAC;}
.ans-pill-0:hover,.ans-pill-0.selected{background:#14532D;border-color:#22C55E;color:#DCFCE7;box-shadow:0 0 12px rgba(34,197,94,0.4);transform:scale(1.02);}
.ans-pill-1{background:#1C1104;border-color:#854D0E;color:#FDE68A;}
.ans-pill-1:hover,.ans-pill-1.selected{background:#422006;border-color:#EAB308;color:#FEF9C3;box-shadow:0 0 12px rgba(234,179,8,0.4);transform:scale(1.02);}
.ans-pill-2{background:#1C0A02;border-color:#9A3412;color:#FDBA74;}
.ans-pill-2:hover,.ans-pill-2.selected{background:#431407;border-color:#F97316;color:#FFEDD5;box-shadow:0 0 12px rgba(249,115,22,0.4);transform:scale(1.02);}
.ans-pill-3{background:#1A0404;border-color:#991B1B;color:#FCA5A5;}
.ans-pill-3:hover,.ans-pill-3.selected{background:#450A0A;border-color:#EF4444;color:#FEE2E2;box-shadow:0 0 12px rgba(239,68,68,0.4);transform:scale(1.02);}
.q-skip{font-size:11px;color:var(--text-dim);cursor:pointer;text-decoration:underline;margin-top:8px;display:inline-block;background:none;border:none;padding:0;font-family:inherit;}
.q-skip:hover{color:var(--text-muted);}
.burden-banner{background:linear-gradient(135deg,rgba(245,158,11,0.1),rgba(245,158,11,0.04));border:1px solid rgba(245,158,11,0.25);border-radius:14px;padding:20px;text-align:center;margin-bottom:20px;}
.burden-banner h2{font-size:20px;font-weight:800;margin-bottom:8px;color:#FDE68A;}
.burden-banner p{font-size:14px;color:var(--text-muted);line-height:1.6;}
.check-circle{width:72px;height:72px;background:rgba(34,197,94,0.12);border:2px solid var(--success);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:32px;}
.session-id-box{background:var(--bg3);border:1px solid var(--border-bright);border-radius:12px;padding:14px 18px;margin-bottom:18px;text-align:center;}
.session-id-label{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.session-id-val{font-size:17px;font-weight:900;color:var(--accent);letter-spacing:2px;font-family:monospace;}
.download-btn{width:100%;padding:14px;background:transparent;color:var(--accent);border:2px solid var(--accent);border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;}
.download-btn:hover{background:var(--accent-dim);}
.report-header{background:linear-gradient(135deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:18px;}
.report-header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:12px;}
.report-lhs{display:flex;align-items:center;gap:12px;}
.report-beacon-img{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--accent);}
.report-meta{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:12px;}
.rmi{background:var(--bg);border-radius:8px;padding:8px 11px;}
.rml{font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px;}
.rmv{font-size:13px;font-weight:700;}
.disclaimer-box{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.25);border-radius:10px;padding:12px 15px;font-size:12px;color:#FCD34D;line-height:1.7;margin-bottom:16px;}
.domain-table{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.domain-table-hdr{display:grid;grid-template-columns:2fr 1fr 1.2fr 1fr;padding:10px 16px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;}
.domain-row{display:grid;grid-template-columns:2fr 1fr 1.2fr 1fr;padding:12px 16px;border-bottom:1px solid var(--border);align-items:center;}
.domain-row:last-child{border-bottom:none;}
.domain-name{font-size:13px;font-weight:600;}
.domain-score{font-size:14px;font-weight:800;color:var(--accent);}
.sev-badge{display:inline-block;font-size:10px;font-weight:700;border-radius:5px;padding:2px 8px;}
.sev-none{background:rgba(34,197,94,0.12);color:#86EFAC;}
.sev-minimal{background:rgba(34,197,94,0.08);color:#6EE7B7;}
.sev-mild{background:rgba(234,179,8,0.12);color:#FDE047;}
.sev-moderate{background:rgba(249,115,22,0.12);color:#FDBA74;}
.sev-severe{background:rgba(239,68,68,0.12);color:#FCA5A5;}
.sev-very-severe{background:rgba(220,38,38,0.2);color:#F87171;}
.items-ct{font-size:11px;color:var(--text-dim);}
.flag-card{background:var(--crisis-bg);border:1px solid var(--crisis-border);border-radius:11px;padding:13px 15px;margin-bottom:8px;display:flex;gap:11px;}
.flag-text{font-size:13px;color:#FCA5A5;font-weight:600;line-height:1.5;}
.flag-sub{font-size:11px;color:var(--text-dim);margin-top:2px;}
.burden-result{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;margin-bottom:16px;}
.report-usa-footer{text-align:center;padding:18px 0 8px;font-size:12px;color:var(--text-dim);border-top:1px solid var(--border);margin-top:18px;}
.nav-bar{position:fixed;bottom:0;left:0;right:0;z-index:99;background:rgba(10,14,29,0.98);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;max-width:700px;margin:0 auto;}
.nav-back{flex:1;padding:13px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--text-muted);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.nav-back:hover{border-color:var(--text-muted);color:var(--text);}
.nav-next{flex:2;padding:13px;background:var(--accent);border:none;border-radius:10px;color:#0A0E1D;font-size:14px;font-weight:800;cursor:pointer;transition:background 0.2s;}
.nav-next:hover{background:var(--accent-hover);}
@media(max-width:500px){.form-row-2{grid-template-columns:1fr;}.domain-table-hdr,.domain-row{grid-template-columns:2fr 1fr 1.2fr;}.domain-table-hdr .hide-sm,.domain-row .items-ct{display:none;}.report-meta{grid-template-columns:1fr;}}
.review-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;overflow:hidden;}
.review-sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.review-sec-title{font-size:15px;font-weight:800;}
.review-edit-btn{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-dim);border:1px solid rgba(0,212,212,0.3);border-radius:7px;padding:5px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.review-edit-btn:hover{background:rgba(0,212,212,0.2);}
.review-q-row{padding:7px 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;}
.review-q-row:last-child{border-bottom:none;padding-bottom:0;}
.review-q-num{font-size:10px;color:var(--text-dim);font-weight:700;min-width:24px;padding-top:2px;}
.review-q-text{font-size:13px;color:var(--text-muted);flex:1;line-height:1.5;}
.review-q-ans{font-size:12px;font-weight:700;white-space:nowrap;padding:3px 9px;border-radius:6px;margin-top:1px;}
.review-ans-0{background:#052E16;color:#86EFAC;border:1px solid #166534;}
.review-ans-1{background:#1C1104;color:#FDE68A;border:1px solid #854D0E;}
.review-ans-2{background:#1C0A02;color:#FDBA74;border:1px solid #9A3412;}
.review-ans-3{background:#1A0404;color:#FCA5A5;border:1px solid #991B1B;}
.review-ans-skip{background:var(--bg3);color:var(--text-dim);border:1px solid var(--border);font-style:italic;}
.review-ans-blank{background:var(--bg3);color:var(--text-dim);border:1px dashed var(--border);}
.review-return-bar{position:sticky;top:60px;z-index:90;background:rgba(0,212,212,0.12);border:1px solid rgba(0,212,212,0.35);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.review-return-btn{font-size:13px;font-weight:700;color:#0A0E1D;background:var(--accent);border:none;border-radius:8px;padding:8px 14px;cursor:pointer;}
.review-submit-btn{width:100%;padding:16px;background:linear-gradient(135deg,#00D4D4,#00AEAE);color:#0A0E1D;border:none;border-radius:12px;font-size:16px;font-weight:900;cursor:pointer;margin-top:6px;letter-spacing:0.02em;}
.review-submit-btn:hover{background:var(--accent-hover);}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
</style>
</head>
<body>
<div id="app">

<div class="sticky-header" id="stickyHeader">
  <div class="header-left">
    <img class="beacon-logo-img" id="hdrLogoImg" src="" alt="Beacon Clinical Registry">
    <div class="brand-wordmark">
      <span class="brand-name">Beacon</span>
      <span class="brand-sub">Clinical Registry</span>
    </div>
    <div class="header-divider"></div>
    <div>
      <div class="nros-symbol"><span class="sN">N</span><span class="sR">R</span><span class="sO">O</span><span class="sS">S</span><span class="sDash">-</span><span class="sP">P</span></div>
      <div class="stars-row">★ ★ ★ ★ ★</div>
    </div>
  </div>
  <div class="progress-wrap" id="progressWrap" style="display:none">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-lbl" id="progressLbl"></div>
  </div>
  <span class="ver-chip">v1.1.4-dev</span>

var SEC=[

  {id:'tics',n:5,title:'Tics',sens:false,cris:false,fr:'Rate the severity of tic behaviors.',

var SCREENS=[];

SEC.forEach(function(s){SCREENS.push({t:'domain',sec:s});});

SCREENS.push({t:'review'});
SCREENS.push({t:'completion'});
SCREENS.push({t:'report'});
var RI=SCREENS.length-1;

var cur=0,R={},B={},reg={},fla={},sid='',cat='',con=false,rv=false,rvSec='';

function sv(){try{localStorage.setItem(STORE+'c',cur);localStorage.setItem(STORE+'r',JSON.stringify(R));localStorage.setItem(STORE+'b',JSON.stringify(B));localStorage.setItem(STORE+'g',JSON.stringify(reg));localStorage.setItem(STORE+'f',JSON.stringify(fla));localStorage.setItem(STORE+'s',sid);localStorage.setItem(STORE+'t',cat);localStorage.setItem(STORE+'rv',rv?'1':'');}catch(e){}}
function ld(){try{var c=localStorage.getItem(STORE+'c');if(c!==null)cur=parseInt(c,10);var r=localStorage.getItem(STORE+'r');if(r)R=JSON.parse(r);var b=localStorage.getItem(STORE+'b');if(b)B=JSON.parse(b);var g=localStorage.getItem(STORE+'g');if(g){reg=JSON.parse(g);con=true;}var f=localStorage.getItem(STORE+'f');if(f)fla=JSON.parse(f);var s=localStorage.getItem(STORE+'s');if(s)sid=s;var t=localStorage.getItem(STORE+'t');if(t)cat=t;var rv2=localStorage.getItem(STORE+'rv');if(rv2)rv=true;}catch(e){}}

function gs(){return 'NP-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,7).toUpperCase();}

function up(){
  var pw=document.getElementById('progressWrap'),pf=document.getElementById('progressFill'),pl=document.getElementById('progressLbl');
  var t=SCREENS[cur].t;
  if(['landing','reg','flare','completion','review','report'].indexOf(t)>=0){if(pw)pw.style.display='none';return;}
  if(pw)pw.style.display='block';
  var di=0;
  if(t==='domain'){for(var i=3;i<cur;i++)if(SCREENS[i].t==='domain')di++;}
  var ib=t==='burden',idx=ib?10:di,pct=Math.round((idx/11)*100);
  if(pf)pf.style.width=pct+'%';
  if(pl)pl.textContent=ib?'Caregiver Wellbeing':'Domain '+(idx+1)+' of 10';
}

function render(){
  var app=document.getElementById('appContent');
  if(!app)return;
  var scr=SCREENS[cur];
  up();window.scrollTo(0,0);
  var t=scr.t;
  if(t==='landing')rLand(app);
  else if(t==='reg')rReg(app);
  else if(t==='flare')rFlare(app);
  else if(t==='domain')rDom(app,scr.sec);
  else if(t==='burden')rBur(app);
  else if(t==='completion')rComp(app);
  else if(t==='review')rReview(app);
  else if(t==='report')rRep(app);
}

function dSc(sid,cnt){
  var vals=[],ans=0,skp=0;
  for(var i=0;i<cnt;i++){var v=R[sid+'_'+i];if(v===undefined||v===null)continue;if(v===-1){skp++;continue;}vals.push(v);ans++;}
  if(!ans)return{score:null,ans:0,skp:skp,total:cnt};
  return{score:Math.round(vals.reduce(function(a,b){return a+b;},0)/ans*100)/100,ans:ans,skp:skp,total:cnt};
}
function bSc(){
  var vals=[],ans=0;
  BURDEN.forEach(function(_,i){var v=B['bur_'+i];if(v!==undefined&&v!==null&&v!==-1){vals.push(v);ans++;}});
  return ans?Math.round(vals.reduce(function(a,b){return a+b;},0)/ans*100)/100:null;
}
function sevB(s){
  if(s===null)return{l:'\u2014',c:''};
  if(s<0.5)return{l:'None\u2013Minimal',c:'sev-none'};
  if(s<1.0)return{l:'Minimal',c:'sev-minimal'};
  if(s<1.6)return{l:'Mild',c:'sev-mild'};
  if(s<2.3)return{l:'Moderate',c:'sev-moderate'};
  if(s<2.8)return{l:'Severe',c:'sev-severe'};
  return{l:'Very Severe',c:'sev-very-severe'};
}
function getF(){
  var f=[];
  var si=R['oth_3'];if(si>=2)f.push({i:'&#x1F6A8;',t:'Suicidal Ideation \u2014 '+SCALE[si].l,s:'Contact care team immediately. Call or text 988.'});
  var hi=R['oth_4'];if(hi>=2)f.push({i:'&#x1F6A8;',t:'Homicidal Ideation \u2014 '+SCALE[hi].l,s:'Contact care team immediately. Call or text 988.'});
  var sh=R['bm_11'];if(sh>=2)f.push({i:'&#x26A0;&#xFE0F;',t:'Self-harm \u2014 '+SCALE[sh].l,s:'Discuss with clinical team at next visit.'});
  var ocd=dSc('ocd',28);if(ocd.score!==null&&ocd.score>=2.3)f.push({i:'&#x1F9E0;',t:'Severe OCD burden ('+ocd.score.toFixed(2)+')',s:'OCD domain in severe range. Clinical review recommended.'});
  return f;
}
function buildLog(){

}

    (flags.length?'<div>'+flags.map(function(f){return '<div class="flag-card"><div style="font-size:18px">'+f.i+'</div><div><div class="flag-text">'+f.t+'</div><div class="flag-sub">'+f.s+'</div></div></div>';}).join('')+'</div>':'')+
    '<div class="domain-table">'+
      '<div class="domain-table-hdr"><span>Domain</span><span>Score</span><span>Severity</span><span class="hide-sm">Items</span></div>'+
      scores.map(function(x){return '<div class="domain-row"><div class="domain-name">'+x.s.title+'</div><div class="domain-score">'+(x.r.score!==null?x.r.score.toFixed(2):'\u2014')+'</div><div><span class="sev-badge '+x.sev.c+'">'+x.sev.l+'</span></div><div class="items-ct">'+x.r.ans+'/'+x.r.total+'</div></div>';}).join('')+
    '</div>'+
    '<div class="burden-result">'+
      '<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Caregiver Burden Score</div>'+
      '<div style="display:flex;align-items:center;justify-content:space-between">'+
        '<div><div style="font-size:26px;font-weight:900;color:var(--accent)">'+(bs!==null?bs.toFixed(2):'\u2014')+'</div><div style="font-size:11px;color:var(--text-dim)">out of 3.00</div></div>'+
        '<div style="font-size:14px;color:var(--text-muted)">'+(bs!==null?sevB(bs).l:'Not completed')+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px">'+
      '<div style="font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Score Reference</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;font-size:12px">'+
        '<div style="padding:6px 10px;background:rgba(34,197,94,.08);border-radius:6px;color:#86EFAC">0.0\u20130.4&nbsp;None to Minimal</div>'+
        '<div style="padding:6px 10px;background:rgba(34,197,94,.06);border-radius:6px;color:#6EE7B7">0.5\u20130.9&nbsp;Minimal</div>'+
        '<div style="padding:6px 10px;background:rgba(234,179,8,.1);border-radius:6px;color:#FDE047">1.0\u20131.5&nbsp;Mild</div>'+
        '<div style="padding:6px 10px;background:rgba(249,115,22,.1);border-radius:6px;color:#FDBA74">1.6\u20132.2&nbsp;Moderate</div>'+
        '<div style="padding:6px 10px;background:rgba(239,68,68,.1);border-radius:6px;color:#FCA5A5">2.3\u20132.7&nbsp;Severe</div>'+
        '<div style="padding:6px 10px;background:rgba(220,38,38,.15);border-radius:6px;color:#F87171">2.8\u20133.0&nbsp;Very Severe</div>'+
      '</div></div>'+
    '<div style="background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:16px;font-size:11px;color:var(--text-dim);line-height:1.7">'+
      'Items adapted from PTEC &copy; 2022\u20132026 Neuroimmune Foundation &nbsp;&bull;&nbsp; <a style="color:var(--accent)" href="https://neuroimmune.org/PTEC" target="_blank">neuroimmune.org/PTEC</a><br>'+
      'Vyshedskiy A et al. <em>Pediatric Reports</em>. 2025;17(4):81.<br>'+
      'NROS-P enhancements &copy; 2026 Beacon Clinical Research &nbsp;&bull;&nbsp; <a style="color:var(--accent)" href="https://beaconcr.com" target="_blank">beaconcr.com</a>'+
    '</div>'+
    '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:8px">'+
      '<button class="download-btn" id="btnDl2">&#128229; Download Session File</button>'+
      '<button class="btn-primary" id="btnPrt">&#128438;&#65039; Print Report</button>'+
      '<button class="btn-secondary" id="btnSO">Start New Assessment</button>'+
    '</div>'+
    '<div class="report-usa-footer">&#127482;&#127480; Designed in America &nbsp;&bull;&nbsp; Beacon Clinical Research &nbsp;&bull;&nbsp; beaconcr.com &nbsp;&bull;&nbsp; NROS-P v'+VERSION+'</div>'+
  '</div>';
  document.getElementById('btnDl2').addEventListener('click',dlSess);
  document.getElementById('btnPrt').addEventListener('click',function(){window.print();});
  document.getElementById('btnSO').addEventListener('click',function(){if(confirm('Start a new assessment? Current data will be cleared.')){cl();render();}});
}

function dlSess(){
  var d=buildLog(),blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='NROS-P-'+sid+'-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function nav(back){
  return '<div class="nav-bar">'+
    (back?'<button class="nav-back" id="navBack">&larr; Back</button>':'')+
    '<button class="nav-next" id="navNext">Next &rarr;</button></div>';
}
function goNext(){if(cur<SCREENS.length-1){cur++;sv();render();}}
function goBack(){if(cur>0){cur--;sv();render();}}

window.addEventListener('DOMContentLoaded',function(){ld();render();});
</script>
</body>
